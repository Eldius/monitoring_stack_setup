---
- name: Uninstall Loki
  hosts: monitoring
  tasks:
    - name: Include Alloy uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.alloy
        tasks_from: uninstall.yml
    - name: Include Grafana uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.grafana
        tasks_from: uninstall.yml
    - name: Include Prometheus uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.prometheus
        tasks_from: uninstall.yml
    - name: Include Loki uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.loki
        tasks_from: uninstall.yml
    - name: Include Tempo uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.tempo
        tasks_from: uninstall.yml
    - name: Include Mimir uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.mimir
        tasks_from: uninstall.yml
    - name: Include base uninstallation tasks
      include_role:
        name: eldius.monitoring_stack_setup.base
        tasks_from: uninstall.yml
