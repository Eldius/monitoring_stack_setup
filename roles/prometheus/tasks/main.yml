---
# tasks file for prometheus
- name: Host info
  debug:
    msg: "{{ item }}"
  with_items:
    - "FQDN: {{ ansible_facts['fqdn'] }}"
    - "ARCH: {{ ansible_facts['architecture'] }}"
    - "OS: {{ ansible_facts['system'] }}"
    - "Kernel: {{ ansible_facts['kernel'] }}"
    - "OS Family: {{ ansible_facts['os_family'] }}"
    - "Dist: {{ ansible_facts['distribution'] }}"
    - "Dist Version: {{ ansible_facts['distribution_version'] }}"

- name: Defining download URL
  set_fact:
    prometheus_download_url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.{{ ansible_facts['system'] | lower }}-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] | lower }}.tar.gz"

- name: Validating download URL
  debug:
    msg: "prometheus_download_url: {{ prometheus_download_url }}"

- name: Creating service group
  group:
    name: "{{ prometheus_service_group }}"
    state: present
  become: true

- name: Creating service user
  user:
    name: "{{ prometheus_service_user }}"
    state: present
  become: true

- name: Preparing folders
  file:
    name: "{{ item }}"
    state: directory
    owner: "{{ prometheus_service_user }}"
    group: "{{ prometheus_service_group }}"
    mode: '0755'
  become: true
  with_items: 
    - "{{ prometheus_install_folder }}"
    - "{{ prometheus_data_folder }}"

- name: Download and extract Prometheus binary
  ansible.builtin.unarchive:
    src: "{{ prometheus_download_url }}"
    dest: "{{ prometheus_install_folder }}"
    owner: "{{ prometheus_service_user }}"
    group: "{{ prometheus_service_group }}"
    mode: '0755'
    remote_src: yes
    extra_opts:
      - '--strip-components=1'
  become: true

- name: Configuring Prometheus
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_install_folder }}/prometheus.yml"
    owner: "{{ prometheus_service_user }}"
    group: "{{ prometheus_service_group }}"
    mode: '0755'
  become: true

