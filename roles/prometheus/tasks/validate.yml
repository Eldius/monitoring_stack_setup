---
- name: Validate Prometheus installation
  block:
#    - name: Verify Prometheus service is running
#      ansible.builtin.systemd:
#        name: prometheus
#      register: prometheus_service_check
#      failed_when: prometheus_service_check.status.ActiveState != 'active'
#
#    - name: Wait for Prometheus to start listening on port 9090
#      ansible.builtin.wait_for:
#        port: 9090
#        timeout: 30
#
#    - name: Verify Prometheus health endpoint
#      ansible.builtin.uri:
#        url: "http://localhost:9090/-/healthy"
#        method: GET
#        status_code: 200
#      register: prometheus_health_check
#      until: prometheus_health_check.status == 200
#      retries: 5
#      delay: 2

    - name: Verify service status for Prometheus
      ansible.builtin.include_role:
        name: health
      vars:
        service_name: prometheus
        health_endpoint: "http://localhost:9090/-/healthy"

    - name: Check Prometheus configuration file exists
      ansible.builtin.stat:
        path: "{{ prometheus_install_folder }}/prometheus.yml"
      register: prometheus_config_stat
      failed_when: not prometheus_config_stat.stat.exists

    - name: Verify Prometheus binary exists
      ansible.builtin.stat:
        path: "{{ prometheus_install_folder }}/prometheus"
      register: prometheus_binary_stat
      failed_when: not prometheus_binary_stat.stat.exists
  become: true
