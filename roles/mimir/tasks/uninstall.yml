---
# tasks file for mimir
- name: Host info
  debug:
    msg: "{{ item }}"
  with_items:
    - "FQDN: {{ ansible_facts['fqdn'] }}"
    - "ARCH: {{ ansible_facts['architecture'] }}"
    - "OS: {{ ansible_facts['system'] }}"
    - "Kernel: {{ ansible_facts['kernel'] }}"
    - "OS Family: {{ ansible_facts['os_family'] }}"
    - "Dist: {{ ansible_facts['distribution'] }}"
    - "Dist Version: {{ ansible_facts['distribution_version'] }}"

- name: Disabling and stopping Mimir service
  systemd:
    name: mimir
    enabled: no
    state: stopped
  become: true
  ignore_errors: true

- name: Removing systemd service file
  file:
    name: /etc/systemd/system/mimir.service
    state: absent
  become: true

- name: Reloading systemd daemon
  systemd:
    daemon_reload: yes
  become: true

- name: Removing service user
  user:
    name: "{{ mimir_service_user }}"
    state: absent
  become: true

- name: Removing service group
  group:
    name: "{{ mimir_service_group }}"
    state: absent
  become: true

- name: Removing folders
  file:
    name: "{{ item }}"
    state: absent
  become: true
  with_items: 
    - "{{ mimir_install_folder }}"
    - "{{ mimir_config_folder }}"
    - "{{ mimir_data_folder }}"
