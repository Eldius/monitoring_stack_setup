---
- name: Validate Mimir installation
  block:
    - name: Verify service status for Mimir
      ansible.builtin.include_role:
        name: health
      vars:
        service_name: mimir
        health_endpoint: "http://localhost:{{ mimir_http_port }}/ready"

    - name: Check Mimir configuration file exists
      ansible.builtin.stat:
        path: "{{ mimir_config_folder }}/mimir-config.yaml"
      register: mimir_config_stat
      failed_when: not mimir_config_stat.stat.exists

    - name: Verify Mimir binary exists
      ansible.builtin.stat:
        path: "{{ mimir_install_folder }}/mimir"
      register: mimir_binary_stat
      failed_when: not mimir_binary_stat.stat.exists
  become: true
