---
- name: Validate Grafana installation
  block:
#    - name: Verify Grafana service is running
#      ansible.builtin.systemd:
#        name: grafana
#      register: grafana_service_check
#      failed_when: grafana_service_check.status.ActiveState != 'active'
#
#    - name: Wait for Grafana to start listening on port 3000
#      ansible.builtin.wait_for:
#        port: 3000
#        timeout: 30
#
#    - name: Verify Grafana health endpoint
#      ansible.builtin.uri:
#        url: "http://localhost:3000/api/health"
#        method: GET
#        status_code: 200
#      register: grafana_health_check
#      until: grafana_health_check.status == 200
#      retries: 5
#      delay: 2

    - name: Verify service status for Grafana
      ansible.builtin.include_role:
        name: health
      vars:
        service_name: grafana
        health_endpoint: "http://localhost:3000/api/health"

    - name: Check Grafana configuration file exists
      ansible.builtin.stat:
        path: "{{ grafana_config_folder }}/grafana.ini"
      register: grafana_config_stat
      failed_when: not grafana_config_stat.stat.exists

    - name: Verify Grafana binary exists
      ansible.builtin.stat:
        path: "{{ grafana_install_folder }}/bin/grafana"
      register: grafana_binary_stat
      failed_when: not grafana_binary_stat.stat.exists
  become: true
