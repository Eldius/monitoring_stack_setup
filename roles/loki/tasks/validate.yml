---
- name: Validate Loki installation
  block:
    - name: Verify Loki service is running
      ansible.builtin.systemd:
        name: loki
      register: loki_service_check
      failed_when: loki_service_check.status.ActiveState != 'active'

    - name: Wait for Loki to start listening on port {{ loki_http_listen_port }}
      ansible.builtin.wait_for:
        port: "{{ loki_http_listen_port }}"
        timeout: 30

    - name: Verify Loki health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ loki_http_listen_port }}/ready"
        method: GET
        status_code: 200
      register: loki_health_check
      until: loki_health_check.status == 200
      retries: 5
      delay: 2

    - name: Check Loki configuration file exists
      ansible.builtin.stat:
        path: "{{ loki_config_folder }}/loki.yaml"
      register: loki_config_stat
      failed_when: not loki_config_stat.stat.exists

    - name: Verify Loki binary exists
      ansible.builtin.stat:
        path: "{{ loki_install_folder }}/loki-{{ ansible_facts['system'] | lower }}-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] | lower }}"
      register: loki_binary_stat
      failed_when: not loki_binary_stat.stat.exists
  become: true
