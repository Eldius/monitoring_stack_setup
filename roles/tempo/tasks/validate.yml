---
- name: Validate Tempo installation
  block:
    - name: Verify Tempo service is running
      ansible.builtin.systemd:
        name: tempo
      register: tempo_service_check
      failed_when: tempo_service_check.status.ActiveState != 'active'

    - name: Wait for Tempo to start listening on port {{ tempo_http_listen_port }}
      ansible.builtin.wait_for:
        port: "{{ tempo_http_listen_port }}"
        timeout: 30

    - name: Verify Tempo health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ tempo_http_listen_port }}/ready"
        method: GET
        status_code: 200
      register: tempo_health_check
      until: tempo_health_check.status == 200
      retries: 5
      delay: 2

    - name: Check Tempo configuration file exists
      ansible.builtin.stat:
        path: "{{ tempo_config_folder }}/tempo.yaml"
      register: tempo_config_stat
      failed_when: not tempo_config_stat.stat.exists

    - name: Verify Tempo binary exists
      ansible.builtin.stat:
        path: "{{ tempo_install_folder }}/tempo-{{ ansible_facts['system'] | lower }}-{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] | lower }}"
      register: tempo_binary_stat
      failed_when: not tempo_binary_stat.stat.exists
  become: true
